<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Peda Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300 font-sans">

    <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-50 py-4 px-8 flex justify-between items-center border-b dark:border-slate-800">
        <a href="index.html" class="flex items-center gap-2">
            <img src="logo.JPG" onerror="this.src='https://placehold.co/100x40/2563eb/ffffff?text=PEDA'" class="h-10 rounded">
            <span class="font-bold text-xl uppercase tracking-tighter">Peda Group</span>
        </a>
        <nav class="flex gap-6 items-center">
            <a href="index.html" class="hover:text-blue-600 font-medium transition-colors">Home</a>
            <a href="contactus.html" class="text-blue-600 font-bold border-b-2 border-blue-600">Contact</a>
            <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800">
                <i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:block text-yellow-400"></i>
            </button>
        </nav>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-16">
        <div class="bg-white dark:bg-slate-900 shadow-2xl rounded-[3rem] p-10 md:p-16 border border-slate-100 dark:border-slate-800">
            <div class="mb-12 text-center">
                <h1 class="text-5xl font-black mb-3 uppercase tracking-tighter">Get In Touch</h1>
                <p class="text-slate-400 font-medium">We respond to all inquiries within 24 business hours.</p>
            </div>
            
            <form id="contact-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block mb-2 font-bold text-[10px] uppercase tracking-[0.2em] text-slate-400">Full Name</label>
                        <input type="text" required placeholder="John Doe"
                            class="w-full p-5 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none outline-none focus:ring-2 focus:ring-blue-600 transition-all">
                    </div>
                    <div>
                        <label class="block mb-2 font-bold text-[10px] uppercase tracking-[0.2em] text-slate-400">Phone Number</label>
                        <input type="tel" required placeholder="+964 7XX XXX XXXX"
                            class="w-full p-5 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none outline-none focus:ring-2 focus:ring-blue-600 transition-all">
                    </div>
                </div>

                <div>
                    <label class="block mb-2 font-bold text-[10px] uppercase tracking-[0.2em] text-slate-400">Message</label>
                    <textarea rows="5" required placeholder="How can our team help you?"
                        class="w-full p-5 rounded-2xl bg-slate-50 dark:bg-slate-800 border-none outline-none focus:ring-2 focus:ring-blue-600 transition-all resize-none"></textarea>
                </div>

                <button type="submit" class="w-full py-6 bg-blue-600 hover:bg-blue-700 text-white font-black text-lg rounded-2xl shadow-xl hover:shadow-blue-500/30 transition-all active:scale-[0.98] uppercase tracking-widest">
                    Send Inquiry
                </button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
