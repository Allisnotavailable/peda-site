<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Peda Company</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-white text-slate-900 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300 font-sans">

    <header class="bg-slate-50 dark:bg-slate-800 py-2 px-6 flex justify-between items-center text-sm border-b dark:border-slate-700">
        <div class="flex gap-4">
            <span class="hidden md:inline"><i class="fas fa-envelope text-blue-600 mr-1"></i> info@pedacompany.com</span>
            <span><i class="fas fa-phone text-blue-600 mr-1"></i> +964 750 000 0000</span>
        </div>
        <div class="flex items-center gap-6">
            <div class="relative">
                <button id="lang-btn" class="flex items-center gap-2 font-semibold hover:text-blue-600 outline-none">
                    <i class="fas fa-globe text-blue-500"></i><span id="current-lang">English</span>
                </button>
                <div id="lang-dropdown" class="hidden absolute right-0 mt-2 w-36 bg-white dark:bg-slate-800 rounded-xl shadow-2xl border dark:border-slate-700 z-[100] overflow-hidden">
                    <button onclick="translatePage('en')" class="w-full text-left px-4 py-3 hover:bg-blue-50 dark:hover:bg-slate-700">English</button>
                    <button onclick="translatePage('ar')" class="w-full text-right px-4 py-3 hover:bg-blue-50 dark:hover:bg-slate-700 border-t dark:border-slate-700">العربية</button>
                    <button onclick="translatePage('ku')" class="w-full text-right px-4 py-3 hover:bg-blue-50 dark:hover:bg-slate-700 border-t dark:border-slate-700">Kurdî</button>
                </div>
            </div>
            <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-yellow-400">
                <i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:block"></i>
            </button>
        </div>
    </header>

    <nav class="sticky top-0 z-50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md px-6 py-3 flex justify-between items-center shadow-sm border-b dark:border-slate-800">
        <div class="flex items-center">
            <a href="index.html">
                <img src="logo.png" onerror="this.src='https://placehold.co/200x60/2563eb/ffffff?text=Peda+Food+Factory'" alt="Logo" class="h-12 w-auto object-contain rounded">
            </a>
        </div>
        <div class="relative">
            <button id="nav-toggle" class="p-2 focus:outline-none">
                <div class="space-y-1.5"><span class="block w-6 h-0.5 bg-slate-800 dark:bg-white"></span><span class="block w-6 h-0.5 bg-slate-800 dark:bg-white"></span><span class="block w-6 h-0.5 bg-slate-800 dark:bg-white"></span></div>
            </button>
            <div id="nav-menu" class="hidden absolute right-0 mt-4 w-52 bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border dark:border-slate-700 overflow-hidden ring-1 ring-black/5">
                <a href="index.html" class="block px-6 py-4 hover:bg-blue-50 dark:hover:bg-slate-700 font-medium" data-key="nav_home">Home</a>
                <a href="services.html" class="block px-6 py-4 hover:bg-blue-50 dark:hover:bg-slate-700 font-medium" data-key="nav_services">Services</a>
                <a href="contactus.html" class="block px-6 py-4 bg-blue-50 dark:bg-slate-700 font-bold" data-key="nav_contact">Contact Us</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-20">
    <div class="bg-white dark:bg-slate-800 shadow-2xl rounded-3xl overflow-hidden border dark:border-slate-700">
        
        <div class="bg-blue-600 p-8 text-white">
            <h1 class="text-3xl font-black uppercase tracking-tight" data-key="nav_contact">Contact Us</h1>
            <p class="opacity-80 mt-2">Send us a message and our team will get back to you shortly.</p>
        </div>

        <form id="contact-form" class="p-8 md:p-12 space-y-8">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-2">
                    <label class="block font-bold text-xs uppercase tracking-widest text-slate-400 dark:text-slate-500" data-key="ph_name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe"
                        class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-600 transition-all">
                </div>

<div class="space-y-2">
    <label class="block font-bold text-xs uppercase tracking-widest text-slate-400 dark:text-slate-500" data-key="ph_phone">Phone Number</label>
    <div class="relative flex">
        <span class="inline-flex items-center px-4 rounded-l-2xl border border-r-0 border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-800 text-slate-500 font-bold">
            +964
        </span>
        <input type="tel" id="phone" required placeholder="750 000 0000"
            pattern="[0-9]{10}"
            class="w-full p-4 rounded-r-2xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-600 transition-all">
    </div>
</div>
            </div>

            <div class="space-y-2">
                <label class="block font-bold text-xs uppercase tracking-widest text-slate-400 dark:text-slate-500" data-key="contact_subject">Subject</label>
                <div class="relative">
                    <select id="subject" required 
                        class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-600 transition-all appearance-none cursor-pointer">
                        <option value="" disabled selected data-key="contact_subject">Select Subject</option>
                        <option value="question" data-key="opt_question">General Question</option>
                        <option value="delivery" data-key="opt_delivery">Delivery Inquiry</option>
                    </select>
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none opacity-50">
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <label class="block font-bold text-xs uppercase tracking-widest text-slate-400 dark:text-slate-500" data-key="ph_msg">Your Message</label>
                <textarea id="message" rows="5" required 
                    class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-600 transition-all resize-none"
                    placeholder="Describe your inquiry..."></textarea>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white font-black text-xl rounded-2xl shadow-xl hover:shadow-blue-500/40 transition-all active:scale-[0.98] flex items-center justify-center gap-3">
                    <span data-key="send_btn">Send Message</span>
                    <i class="fas fa-paper-plane text-sm opacity-70"></i>
                </button>
            </div>
        </form>
    </div>
</main>

    <button id="backToTop" class="fixed bottom-8 right-8 bg-blue-600 text-white w-14 h-14 rounded-full shadow-2xl opacity-0 translate-y-10 transition-all duration-300 hover:bg-blue-700 flex items-center justify-center z-[200]">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="script.js"></script>
</body>
</html>
