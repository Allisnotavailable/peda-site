<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğtaş | Duhok | Peda Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'premium-blue': '#001B3D',
                        'premium-gold': '#D4AF37',
                        // Luxurious Dogtas Colors
                        'dogtas-dark': '#1e1e1a', 
                        'dogtas-cream': '#fdfbf6' 
                    }
                }
            }
        }
    </script>
    <style>
        /* Base Animation Definitions */
        @keyframes float { 
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(10px, -20px) rotate(5deg); }
        }
        @keyframes drift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-10px, 20px) rotate(-5deg); }
        }
        /* Special Reflection Shimmer */
        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-20deg); opacity: 0; }
            50% { opacity: 0.2; }
            100% { transform: translateX(150%) skewX(-20deg); opacity: 0; }
        }
        
        .animated-shape { animation: float 15s ease-in-out infinite; }
        .animated-shape-slow { animation: drift 25s ease-in-out infinite; }
        .animated-shape-fast { animation: float 10s ease-in-out infinite; }
        
        /* Shimmer Reflection for the logo */
        .reflection-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to right, 
                transparent, 
                rgba(255, 255, 255, 0.4) 30%, 
                rgba(255, 255, 255, 0.8) 50%, 
                rgba(255, 255, 255, 0.4) 70%, 
                transparent
            );
            animation: shimmer 5s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-dogtas-dark text-dogtas-cream transition-colors duration-300 font-sans min-h-screen relative overflow-x-hidden">

    <header class="bg-dogtas-dark/70 backdrop-blur-md sticky top-0 z-50 py-4 px-8 flex justify-between items-center border-b border-white/5">
        <a href="index.html" class="flex items-center gap-2">
            <span class="font-bold tracking-tighter text-xl uppercase text-white">Doğtaş</span>
            <span class="font-bold tracking-tighter text-xl uppercase text-slate-500">Peda</span>
        </a>
        <nav class="flex gap-6 items-center">
            <a href="index.html" class="hover:text-premium-gold transition-colors font-medium">Home</a>
            <button id="theme-toggle" class="text-premium-gold"><i class="fas fa-adjust text-lg"></i></button>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-16 relative z-10">
        
        <div class="text-center mb-16 relative">
            <div class="relative inline-block px-10 py-5 rounded-2xl bg-white reflection-layer overflow-hidden shadow-2xl">
                <h1 class="text-7xl font-black text-dogtas-dark tracking-tighter uppercase mb-2">Doğtaş</h1>
                <p class="text-sm font-bold text-premium-gold/70 tracking-widest uppercase">SLEEK & MODERN TURKISH FURNITURE</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div onclick="openProductPopup('sofa_lounge')" class="group cursor-pointer p-8 rounded-4xl bg-white dark:bg-dogtas-cream text-dogtas-dark shadow-xl hover:-translate-y-2 transition-all duration-300 border-2 border-transparent hover:border-premium-gold">
                <div class="w-16 h-16 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-400 mb-6 transition-all group-hover:scale-110 group-hover:rotate-6">
                    <i class="fas fa-couch text-2xl"></i>
                </div>
                <h3 class="text-2xl font-black mb-2" data-key="dogtas_sofa_title">The Lounge Sofa</h3>
                <p class="text-sm text-slate-500 leading-relaxed mb-4" data-key="dogtas_sofa_desc">Elegant curves meet modern functionality. Perfect for contemporary Duhok homes.</p>
                <div class="text-xs font-bold text-premium-gold uppercase tracking-widest">View Details <i class="fas fa-chevron-right ml-1"></i></div>
            </div>

            <div onclick="openProductPopup('bed_haven')" class="group cursor-pointer p-8 rounded-4xl bg-white dark:bg-dogtas-cream text-dogtas-dark shadow-xl hover:-translate-y-2 transition-all duration-300 border-2 border-transparent hover:border-premium-gold">
                <div class="w-16 h-16 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-400 mb-6 transition-all group-hover:scale-110 group-hover:rotate-6">
                    <i class="fas fa-bed text-2xl"></i>
                </div>
                <h3 class="text-2xl font-black mb-2" data-key="dogtas_bed_title">Haven Master Bed</h3>
                <p class="text-sm text-slate-500 leading-relaxed mb-4" data-key="dogtas_bed_desc">Minimalist design with built-in ergonomic support. Experience restful Turkish sleep.</p>
                <div class="text-xs font-bold text-premium-gold uppercase tracking-widest">View Details <i class="fas fa-chevron-right ml-1"></i></div>
            </div>
            
        </div>
    </main>

    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden opacity-30 dark:opacity-10">
        <div class="absolute -top-10 -left-10 w-96 h-96 rounded-full bg-slate-600/30 blur-[100px] animated-shape"></div>
        <div class="absolute top-1/2 -right-20 w-80 h-80 rounded-full bg-white/10 blur-[80px] animated-shape-slow"></div>
        <div class="absolute -bottom-1/4 left-1/3 w-64 h-64 rounded-full bg-premium-gold/10 blur-[90px] animated-shape-fast"></div>
        
        <div class="absolute top-1/4 left-1/4 w-0.5 h-full bg-white/10 animated-shape-slow rotate-45 transform-origin-top"></div>
        <div class="absolute top-1/2 left-3/4 w-0.5 h-full bg-white/10 animated-shape rotate-12 transform-origin-top"></div>
    </div>
